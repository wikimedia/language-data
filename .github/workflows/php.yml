name: PHP build
on:
  [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.1, 8.2, 8.3, 8.4, 8.5]
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --ansi

      - name: Running all checks and tests
        run: composer test

      - name: Regenerate JSON Data from database definitions
        run: php src/util/ulsdata2json.php

      - name: Commit perfectly formatted JSON files automatically
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-regenerate language-data.json layout structures"
          file_pattern: 'data/language-data.json'
